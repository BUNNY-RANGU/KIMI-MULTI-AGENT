[build]
  # Removed pip install to avoid build failures (only needed for backend, not frontend build)
  # cd frontend ensures we are in the right folder for npm commands
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/out"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  # Change this to your deployed backend URL (e.g. from Render)
  to = "https://your-backend-url.onrender.com/:splat"
  status = 200
